<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}">
    <title>AI Code Reviewer</title>
</head>
<body>

    <h1>AI Code Reviewer 🚀</h1>

    <form method="POST">

        <textarea
            name="code"
            rows="15"
            cols="80"
            placeholder="Paste your code here..."
        ></textarea>

        <br><br>

        <button type="submit">
            Review Code
        </button>

    </form>

    {% if review %}
        <h2>Review Result</h2>
        <pre>{{ review }}</pre>
    {% endif %}

</body>
</html>
